name: Build RozOS UEFI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Pobranie kodu źródłowego z repozytorium
    - name: Checkout source code
      uses: actions/checkout@v4

    # 2. Instalacja niezbędnych kompilatorów i biblioteki gnu-efi
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc gnu-efi build-essential

    # 3. Wywołanie Twojego pliku Makefile w celu kompilacji systemu
    - name: Compile BOOT64.EFI
      run: make

    # 4. Zapisanie gotowego pliku BOOT64.EFI jako artefaktu zadania
    - name: Upload BOOT64.EFI artifact
      uses: actions/upload-artifact@v4
      with:
        name: RozOS-BOOT64-EFI
        path: BOOT64.EFI
        if-no-files-found: error